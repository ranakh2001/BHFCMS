workflows:
  ios-testflight:
    name: iOS TestFlight Build

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Get Flutter dependencies
        script: |
          flutter pub get

      - name: Generate unique build number
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "Using build number: $BUILD_NUMBER"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true